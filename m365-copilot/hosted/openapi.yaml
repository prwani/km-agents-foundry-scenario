openapi: 3.0.3
info:
  title: KM Hosted Case Study API
  version: 0.3.0
servers:
  - url: https://<km-portal-fqdn>
paths:
  /api/case-studies:
    post:
      operationId: createHostedCaseStudy
      summary: Create and validate a case-study deck with the Hosted stack
      security:
        - entraOAuth:
            - api://<portal-api-app-client-id>/access_as_user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HostedCaseStudyRequest'
      responses:
        "200":
          description: Case-study generation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaseStudyResponse'
components:
  securitySchemes:
    entraOAuth:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://login.microsoftonline.com/<tenant-id>/oauth2/v2.0/authorize
          tokenUrl: https://login.microsoftonline.com/<tenant-id>/oauth2/v2.0/token
          scopes:
            api://<portal-api-app-client-id>/access_as_user: Invoke the KM case-study portal as the signed-in user.
  schemas:
    HostedCaseStudyRequest:
      type: object
      required: [implementation, customer_name, customer_name_approved_for_external_use, opportunity_summary, audience, template_url, source_artifacts, correlation_id]
      properties:
        implementation:
          type: string
          enum: [hosted]
          default: hosted
        customer_name:
          type: string
          maxLength: 120
        customer_name_approved_for_external_use:
          type: boolean
        opportunity_summary:
          type: string
          maxLength: 4000
        audience:
          type: string
          maxLength: 200
        template_url:
          type: string
          format: uri
        source_artifacts:
          type: array
          minItems: 1
          maxItems: 10
          items:
            $ref: '#/components/schemas/SourceArtifact'
        correlation_id:
          type: string
          minLength: 8
          maxLength: 100
    SourceArtifact:
      type: object
      required: [url, kind]
      properties:
        url:
          type: string
          format: uri
        kind:
          type: string
          enum: [docx, pptx, pdf, xlsx]
        size_bytes:
          type: integer
          minimum: 1
          maximum: 20971520
        sha256:
          type: string
          pattern: '^[a-f0-9]{64}$'
    CaseStudyResponse:
      type: object
      required: [implementation, correlation_id, status, validation, repair_attempts]
      properties:
        implementation:
          type: string
          enum: [hosted]
        correlation_id:
          type: string
        status:
          type: string
        repair_attempts:
          type: integer
          minimum: 0
          maximum: 2
        validation:
          type: object
          required: [approved, findings, policy_version]
          properties:
            approved:
              type: boolean
            policy_version:
              type: string
            findings:
              type: array
              items:
                type: object
        artifact:
          type: object
          nullable: true
          properties:
            artifact_id:
              type: string
            name:
              type: string
            content_type:
              type: string
            size_bytes:
              type: integer
            sha256:
              type: string
            expires_at:
              type: string
              format: date-time
            single_use:
              type: boolean
