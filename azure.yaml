# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

requiredVersions:
    extensions:
        azure.ai.agents: '>=1.0.0-beta.4'
name: km-agents-foundry-scenario
metadata:
    template: km-agents-foundry-scenario@0.1.0
services:
    ai-project:
        host: azure.ai.project
        deployments:
            - model:
                format: OpenAI
                name: gpt-5.4-mini
                version: "2026-03-17"
              name: gpt-5.4-mini
              sku:
                capacity: 20
                name: GlobalStandard
    hosted-case-study-agent:
        project: src
        host: azure.ai.agent
        language: python
        uses:
            - ai-project
        codeConfiguration:
            entryPoint: main.py
            runtime: python_3_13
        container:
            resources:
                cpu: "0.5"
                memory: 1Gi
        description: Uses Agent Framework Harness to generate, deterministically validate, and repair case-study decks in one fail-closed workflow.
        environmentVariables:
            - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
              value: ${AZURE_AI_MODEL_DEPLOYMENT_NAME}
            - name: CASE_STUDY_TEMPLATE_PATH
              value: assets/templates/contoso-case-study-template.pptx
            - name: CASE_STUDY_BRAND_GUIDELINES_PATH
              value: assets/templates/contoso-case-study-template-with-brand-guidelines.pptx
            - name: PPTX_SKILL_PATH
              value: skills/pptx
            - name: HARNESS_MAX_ITERATIONS
              value: "3"
            - name: HARNESS_DISABLE_WEB_SEARCH
              value: "true"
            - name: HARNESS_DISABLE_SHELL
              value: "true"
            - name: MAX_REPAIR_ATTEMPTS
              value: "2"
            - name: TEMPLATE_POLICY_PATH
              value: assets/templates/contoso-template-policy.json
        kind: hosted
        name: km-hosted-case-study-agent
        protocols:
            - protocol: responses
              version: 2.0.0
    km-portal:
        project: .
        host: containerapp
        language: python
        docker:
            path: Dockerfile
            remoteBuild: true
        uses:
            - ai-project
            - hosted-case-study-agent
infra:
    provider: bicep
    path: infra
